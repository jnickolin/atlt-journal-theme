name: Deploy Theme

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npx gulp build

      - uses: TryGhost/action-deploy-theme@v1
        with:
          api-url: https://a-time-like-this.ghost.io
          api-key: ${{ secrets.GHOST_ADMIN_API_KEY }}
